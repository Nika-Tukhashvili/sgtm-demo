<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GTG + sGTM Demo — sgtm-demo.site</title>

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('consent', 'default', {
      'analytics_storage': 'granted',
      'ad_storage': 'granted',
      'ad_user_data': 'granted',
      'ad_personalization': 'granted'
    });
  </script>

  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    '/scripts/?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KXHRG8ZH');</script>

  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --green: #10b981;
      --green-dim: rgba(16,185,129,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      max-width: 36rem;
      width: 100%;
      background: var(--surface);
      border-radius: 14px;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #34d399;
      background: var(--green-dim);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 99px;
      padding: 0.2rem 0.65rem;
      margin-bottom: 0.85rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }
    .arch {
      font-size: 0.8rem;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      color: #93c5fd;
      line-height: 1.6;
    }
    .arch strong { color: #bfdbfe; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.2rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      font-weight: 400;
    }
    button.secondary:hover { background: rgba(255,255,255,0.06); }
    #status {
      font-size: 0.83rem;
      color: var(--muted);
      min-height: 1.3em;
    }
  </style>
</head>
<body>

  <noscript><iframe src="/scripts/ns.html?id=GTM-KXHRG8ZH"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <main>
    <div class="badge">GTG + sGTM — Cloud Run</div>
    <h1>Server-Side GTM Demo</h1>
    <p class="subtitle">
      All tagging traffic flows through <code>sgtm-demo.site</code>.
      No direct requests to Google endpoints from the browser.
    </p>

    <div class="arch">
      <strong>JS delivery:</strong> /scripts/*, /?id=G-*, /gtd → GTG (fps.goog edge CDN)<br>
      <strong>Data collection:</strong> /metrics/g/collect → Cloud Run sGTM → GA4 server-to-server
    </div>

    <div class="actions">
      <button type="button" id="btn-purchase">Trigger Purchase</button>
      <button type="button" id="btn-lead" class="secondary">Trigger Lead</button>
    </div>
    <p id="status" aria-live="polite"></p>
  </main>

  <script>
    const status = document.getElementById('status');

    document.getElementById('btn-purchase').addEventListener('click', function () {
      window.dataLayer.push({
        event: 'custom_purchase',
        value: 99.99,
        currency: 'USD'
      });
      status.textContent = 'custom_purchase pushed — GA4 hit sent via sGTM.';
    });

    document.getElementById('btn-lead').addEventListener('click', function () {
      window.dataLayer.push({
        event: 'custom_lead',
        form_id: 'contact-form'
      });
      status.textContent = 'custom_lead pushed — GA4 hit sent via sGTM.';
    });
  </script>

</body>
</html>
